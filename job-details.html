<!DOCTYPE html>
<html>
<head>
    <title>Job Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2 class="logo">DBL</h2>
</header>

<section class="apply-section" id="jobDetails">

    <!-- Dynamic job details will appear here -->

</section>

<script>
const API_URL = "https://docs.google.com/spreadsheets/d/1OJ1F12TRZV-QGsiCKOPXD0nAq1v0ZObDuhNqsRCJK4k/edit?resourcekey=&gid=1322539350#gid=1322539350";

const params = new URLSearchParams(window.location.search);
const jobId = params.get("id");

async function loadJobDetails() {
    const res = await fetch(API_URL);
    const jobs = await res.json();

    const job = jobs.find(j => j.JobID == jobId);

    const container = document.getElementById("jobDetails");

    let html = `
        <h1>${job["Job Title"]}</h1>
        <h3>Location: ${job.Location} | Experience: ${job.Experience}</h3>
        <br>
    `;

    for (const key in job) {
        if (["JobID","Job Title","Location","Experience","Status","Timestamp"].includes(key)) continue;
        html += `<h2>${key}</h2><p>${job[key]}</p>`;
    }

    html += `
        <br><br>
        <a href="https://forms.gle/GKWMRFmRonT7o7TD9" target="_blank">
            <button style="padding:15px 30px; font-size:16px;">Apply Now</button>
        </a>
    `;

    container.innerHTML = html;
}

loadJobDetails();
</script>

</body>
</html>
