<!DOCTYPE html>
<html>
<head>
    <title>Job Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2 class="logo">DBL</h2>
</header>

<section class="apply-section" id="jobDetails">

    <!-- Dynamic job details will appear here -->

</section>

<script>
// ⭐ read job JSON from URL
const params = new URLSearchParams(window.location.search);
const jobData = JSON.parse(decodeURIComponent(params.get("job")));

const container = document.getElementById("jobDetails");

// build HTML dynamically
let html = `
    <h1>${jobData["Job Title"]}</h1>
    <h3>
        Location: ${jobData.Location || ""} |
        Experience: ${jobData.Experience || ""}
    </h3>
    <br>
`;

// ⭐ print ALL dynamic fields from sheet
for (const key in jobData) {

    // skip fields already shown above
    if (["Job Title","Location","Experience","Timestamp","Status"].includes(key))
        continue;

    const value = jobData[key];
    if (!value) continue;

    html += `
        <h2>${key}</h2>
        <p>${value}</p>
    `;
}

// Apply button stays same
html += `
    <br><br>
    <a href="https://forms.gle/kCbTjDJGcTCs43ee9" target="_blank">
        <button style="padding:15px 30px; font-size:16px;">
            Apply Now
        </button>
    </a>
`;

container.innerHTML = html;
</script>

</body>
</html>
