<!DOCTYPE html>
<html>
<head>
    <title>Job Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2 class="logo">DBL</h2>
</header>

<section class="apply-section" id="jobDetails">
    <p>Loading job details...</p>
</section>

<script>
document.addEventListener("DOMContentLoaded", async function () {

const API_URL = "https://script.google.com/macros/s/AKfycbw1A7NpzEfnjBBnbxyEhKSx_SoJTVtd4LoUcrob8mBN_ZDDzPHUeiTaCL6pmNHI-rqKig/exec";

const params = new URLSearchParams(window.location.search);
const jobId = params.get("id");

const container = document.getElementById("jobDetails");

try {
    const res = await fetch(API_URL);
    const jobs = await res.json();

    console.log("All jobs:", jobs);
    console.log("Requested JobID:", jobId);

    const job = jobs.find(j => String(j.JobID) === String(jobId));

    if (!job) {
        container.innerHTML = "<h2>Job not found or closed.</h2>";
        return;
    }

    let html = `<h1>${job["Job Title"]}</h1><br>`;

    // show ALL fields dynamically
    for (const key in job) {
        if (["JobID","Status","Timestamp"].includes(key)) continue;
        html += `<p><b>${key}:</b> ${job[key]}</p>`;
    }

    html += `
        <br><br>
        <a href="https://forms.gle/GKWMRFmRonT7o7TD9" target="_blank">
            <button style="padding:15px 30px; font-size:16px;">Apply Now</button>
        </a>
    `;

    container.innerHTML = html;

} catch (err) {
    console.error(err);
    container.innerHTML = "<p>Failed to load job details.</p>";
}

});
</script>

</body>
</html>
