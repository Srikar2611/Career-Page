<!DOCTYPE html>
<html>
<head>
    <title>Job Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2 class="logo">DBL</h2>
    <button onclick="window.location.href='https://srikar2611.github.io/Career-Page/'">HOME</button>
</header>

<section class="apply-section" id="jobDetails">
    <p>Loading job details...</p>
</section>

<script>
document.addEventListener("DOMContentLoaded", async function () {

const API_URL = "https://script.google.com/macros/s/AKfycbxH2s-d294_x81RqRZBtkWAgAUeEgbR4xCOwk6F80c7EkE3oslSO77OVWecTqkobB8/exec";

const params = new URLSearchParams(window.location.search);
const jobId = params.get("id");
const container = document.getElementById("jobDetails");

try {
    const res = await fetch(API_URL);
    const jobs = await res.json();

    const job = jobs.find(j => String(j.JobID) === String(jobId));

    if (!job) {
        container.innerHTML = "<h2>Job not found.</h2>";
        return;
    }

    let html = `
        <h1>${job["Job Title"]}</h1>
        <h3>
            Location: ${job["Location"]} |
            Experience: ${job["Experience"]} Years |
            Department: ${job["Department"]}
        </h3>
        <br>
    `;

    
    if (job["Job Description"]) {
        html += `
            <h2>Job Description</h2>
            <p>${job["Job Description"]}</p>
        `;
    }

    if (job["Responsibilities"]) {
        html += `
            <h2>Responsibilities</h2>
            <p>${job["Responsibilities"]}</p>
        `;
    }

    if (job["Required Skills"]) {
        html += `
            <h2>Required Skills</h2>
            <p>${job["Required Skills"]}</p>
        `;
    }

    
    for (const key in job) {
        if ([
            "JobID","Timestamp","Status",
            "Job Title","Department","Experience","Age","Location",
            "Job Description","Responsibilities","Required Skills"
        ].includes(key)) continue;

        html += `<p><b>${key}:</b> ${job[key]}</p>`;
    }

    html += `
        <br><br>
        <a href="https://forms.gle/JPpJPWtQw17ExZHK7" target="_blank">
            <button style="padding:15px 30px; font-size:16px;">
                Apply Now
            </button>
        </a>
    `;

    container.innerHTML = html;

} catch (err) {
    console.error(err);
    container.innerHTML = "<p>Failed to load job details.</p>";
}

});
</script>
</body>
</html>
