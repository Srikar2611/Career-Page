<!DOCTYPE html>
<html>
<head>
    <title>Job Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2 class="logo">DBL</h2>
    <button onclick="window.location.href='https://srikar2611.github.io/Career-Page/'">
        HOME
    </button>
</header>

<section class="apply-section" id="jobDetails">
    <p>Loading job details...</p>
</section>

<script>
document.addEventListener("DOMContentLoaded", async function () {

const API_URL = "https://script.google.com/macros/s/AKfycbzMMbdcYAliS9v0UerCRd6IU5BIfuPwpP8wwZPYvmso5jh-0rz8301u0tgETXaXXdxK/exec"; 

const params = new URLSearchParams(window.location.search);
const jobId = params.get("jobId");

const container = document.getElementById("jobDetails");

try {

    if (!jobId) {
        container.innerHTML = "<h2>No Job ID provided</h2>";
        return;
    }

    const res = await fetch(API_URL);
    const jobs = await res.json();

    console.log("Jobs:", jobs);
    console.log("URL Job ID:", jobId);

    // 🔥 Bulletproof matching (handles JOB-101 vs 101)
    const job = jobs.find(j => {
        const apiId = String(j.jobId).replace("JOB-","").trim();
        const urlId = String(jobId).replace("JOB-","").trim();
        return apiId === urlId;
    });

    if (!job) {
        container.innerHTML = "<h2>Job not found</h2>";
        return;
    }

    let html = `
        <h1>${job.title}</h1>

        <h3>
            ${job.department} | ${job.location}
        </h3>

        <p><b>Job ID:</b> ${job.jobId}</p>
        <p><b>Experience:</b> ${job.experience} years</p>
        <p><b>Salary:</b> ${job.salary}</p>
        <p><b>Positions:</b> ${job.positions}</p>

        <br>

        <h2>Job Description</h2>
        <p>${job.description}</p>

        <h2>Responsibilities</h2>
        <p>${job.responsibilities}</p>

        <h2>Required Skills</h2>
        <p>${job.skills}</p>

        <br><br>

        <button onclick="applyNow('${job.jobId}')"
            style="padding:15px 30px; font-size:16px;">
            Apply Now
        </button>
    `;

    container.innerHTML = html;

} catch (err) {
    console.error(err);
    container.innerHTML = "<p>Error loading job details</p>";
}


// 🔥 APPLY BUTTON FUNCTION (AUTO FILLS JOB ID)
window.applyNow = function(jobId){

    // 🔴 Replace with your actual prefilled form link
    const formBase = "https://docs.google.com/forms/d/e/1FAIpQLSelt34ipMayNe8mlhsySMZeDUGG5pbdHnpXVDDCK7X9A7YleA/viewform";

    // 🔴 Replace with your Job ID field entry ID
    const jobField = "entry.123456789";

    const finalUrl = formBase + "?" + jobField + "=" + encodeURIComponent(jobId);

    window.open(finalUrl, "_blank");
};

});
</script>

</body>
</html>
