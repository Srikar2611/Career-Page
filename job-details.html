<!DOCTYPE html>
<html>
<head>
    <title>Job Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2 class="logo">DBL</h2>
</header>

<section class="apply-section" id="jobDetails">
    <p>Loading job details...</p>
</section>

<script>
document.addEventListener("DOMContentLoaded", async function () {

const API_URL = "PASTE_YOUR_EXEC_URL_HERE";

// get JobID from URL
const params = new URLSearchParams(window.location.search);
const jobId = params.get("id");

const container = document.getElementById("jobDetails");

try {
    const res = await fetch(API_URL);
    const jobs = await res.json();

    const job = jobs.find(j => j.JobID == jobId);

    if (!job) {
        container.innerHTML = "<p>Job not found.</p>";
        return;
    }

    // ⭐ Build dynamic HTML
    let html = `<h1>${job["Job Title"]}</h1>`;

    for (const key in job) {
        if (["JobID","Job Title","Status","Timestamp"].includes(key)) continue;
        html += `<p><b>${key}:</b> ${job[key]}</p>`;
    }

    html += `
        <br><br>
        <a href="https://forms.gle/GKWMRFmRonT7o7TD9" target="_blank">
            <button style="padding:15px 30px; font-size:16px;">
                Apply Now
            </button>
        </a>
    `;

    container.innerHTML = html;

} catch (err) {
    container.innerHTML = "<p>Failed to load job details.</p>";
}

});
</script>

</body>
</html>
