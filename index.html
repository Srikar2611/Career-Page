<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz6F3XcIjOnVHBsQ26RU0p9xrVoTFaz_KDDEVdYtCDEZq4qDt6x8nEO5W2aoljdovGECA/exec";

async function loadJobs() {
    const container = document.getElementById("jobsContainer");
    container.innerHTML = "Loading jobs...";

    const response = await fetch(API_URL);
    const jobs = await response.json();

    container.innerHTML = "";

    jobs.forEach(job => {

        const card = document.createElement("div");
        card.className = "job-card";

        // IMPORTANT: dataset used by your existing filters
        card.dataset.category = job["Department"] || "";
        card.dataset.type = "Full Time";
        card.dataset.location = job["Location"] || "";

        card.innerHTML = `
            <h3>${job["Job Title"]}</h3>
            <p>Department: ${job["Department"]}</p>
            <p>Location: ${job["Location"]}</p>
            <p>Experience: ${job["Experience"]}</p>

            <a href="job-details.html?id=${job["JobID"]}">
                <button>More Details</button>
            </a>
        `;

        container.appendChild(card);
    });
}

loadJobs();
</script>
