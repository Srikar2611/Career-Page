<!DOCTYPE html>
<html>
<head>
    <title>DBL Careers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="nav">
    <div class="container">
        <h2>DBL Careers</h2>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h1>Build The Future With Us</h1>
        <p>We are a technology driven company building intelligent solutions.</p>
    </div>
</section>

<section class="stats">
    <div class="container stats-grid">
        <div><h2>5000+</h2><p>Employees</p></div>
        <div><h2>50+</h2><p>Open Roles</p></div>
        <div><h2>4.8★</h2><p>Glassdoor Rating</p></div>
    </div>
</section>

<section class="jobs">
    <div class="container">
        <h1 class="section-title">Open Positions</h1>

        <div id="jobsContainer" class="jobs-grid">
            <p>Loading jobs...</p>
        </div>
    </div>
</section>

<script src="jobs.js"></script>

</body>
</html>
