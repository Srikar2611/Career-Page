<!DOCTYPE html>
<html>
<head>
    <title>Careers - ATS</title>
    <link rel="stylesheet" href="style.css">  
</head>

<body>

<header>
    <h2 class="logo">DBL</h2>
    <button>HOME</button>
</header>

<section class="intro">
    <h1>Build The Future With Us</h1>
    <p>
        We are a technology driven company building intelligent solutions
        that impact millions of users.
    </p>
</section>

<section class="filter-section">
    <input type="text" id="searchInput" placeholder="Search by title">
    <select id="categoryFilter">
        <option value="">All Categories</option>
        <option value="Engineering">Engineering</option>
        <option value="Finance">Finance</option>
        <option value="Sales">Sales</option>
    </select>
</section>

<!-- ⭐ JOBS LOAD HERE -->
<section class="jobs-section" id="jobsContainer"></section>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwYD_M5-HFyHf4kchIDe1bxSklv1ax0mowwWaeYVv7T6quNAlWKpNEkzcnxtDeCuQ9oZg/exec";
let allJobs = [];

async function loadJobs() {
    const res = await fetch(API_URL);
    allJobs = await res.json();
    renderJobs(allJobs);
}

function renderJobs(jobs) {
    const container = document.getElementById("jobsContainer");
    container.innerHTML = "";

    jobs.forEach(job => {
        const card = document.createElement("div");
        card.className = "job-card";
        card.dataset.category = job["Department"] || "";

        card.innerHTML = `
            <h3>${job["Job Title"]}</h3>
            <p>Department: ${job["Department"]}</p>
            <p>Location: ${job["Location"]}</p>
            <p>Experience: ${job["Experience"]}</p>

            <a href="job-details.html?id=${job.JobID}">
                <button>More Details</button>
            </a>
        `;

        container.appendChild(card);
    });
}

function filterJobs() {
    const searchValue = document.getElementById("searchInput").value.toLowerCase();
    const categoryValue = document.getElementById("categoryFilter").value;

    const filtered = allJobs.filter(job => {
        const titleMatch = job["Job Title"].toLowerCase().includes(searchValue);
        const categoryMatch = !categoryValue || job["Department"] === categoryValue;
        return titleMatch && categoryMatch;
    });

    renderJobs(filtered);
}

document.getElementById("searchInput").addEventListener("input", filterJobs);
document.getElementById("categoryFilter").addEventListener("change", filterJobs);

loadJobs();
</script>

</body>
</html>
