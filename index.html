<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBL Careers</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="nav">
  <div class="container nav-inner">
    <h2>DBL Careers</h2>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1>Build The Future With Us</h1>
    <p>We are a technology driven company building intelligent solutions.</p>
  </div>
</section>

<!-- STATS -->
<section class="stats">
  <div class="container stats-inner">
    <div class="stat"><h2>5000+</h2><p>Employees</p></div>
    <div class="stat"><h2>50+</h2><p>Open Roles</p></div>
    <div class="stat"><h2>4.8★</h2><p>Glassdoor</p></div>
  </div>
</section>

<!-- JOBS -->
<section class="jobs">
  <div class="container">
    <h1 class="title">Open Positions</h1>
    <div id="jobsContainer" class="jobs-grid">
      Loading jobs...
    </div>
  </div>
</section>

<script src="jobs.js"></script>
</body>
</html>
